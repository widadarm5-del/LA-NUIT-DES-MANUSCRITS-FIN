<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 LA NUIT DES MANUSCRITS - Pixel Detective</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a2a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            font-family: 'Press Start 2P', cursive;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        #game-container {
            width: 100%;
            max-width: 1000px;
            background: #1a2a3a;
            border: 8px solid #ffd700;
            border-radius: 0;
            box-shadow: 0 0 0 4px #4a7a9c, 0 20px 40px rgba(0,0,0,0.9);
            padding: 20px;
            position: relative;
            min-height: 800px;
            background-image: repeating-linear-gradient(45deg, #2a3a4a 0px, #2a3a4a 4px, #1a2a3a 4px, #1a2a3a 8px);
        }
        
        /* Effet CRT scanlines */
        #game-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(0deg, rgba(0,0,255,0.1) 0px, rgba(0,0,255,0.1) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 10;
        }
        
        /* EN-TÊTE AVEC COULEURS JAUNE/BLEU */
        .pixel-header {
            background: #ffd700;
            border: 4px solid #4a7a9c;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: inset -4px -4px 0 #b8860b, inset 4px 4px 0 #ffffa0;
        }
        
        .pixel-title {
            color: #1a2a3a;
            font-size: 0.7em;
            text-shadow: 2px 2px 0 #4a7a9c;
        }
        
        .pixel-badge {
            background: #4a7a9c;
            color: #ffd700;
            padding: 8px 12px;
            border: 3px solid #ffd700;
            font-size: 0.5em;
        }
        
        /* BARRE DE PROGRESSION STYLE PIXEL */
        .pixel-progress {
            background: #1a1a2a;
            border: 4px solid #ffd700;
            height: 25px;
            margin: 20px 0;
            display: flex;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a7a9c, #7ab0d0);
            width: 0%;
            transition: width 0.3s;
            box-shadow: inset -2px -2px 0 #2a4a6a;
        }
        
        .progress-steps {
            position: absolute;
            top: -30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            color: #ffd700;
            font-size: 0.5em;
        }
        
        /* INVENTAIRE */
        .pixel-inventory {
            background: #1a2a3a;
            border: 4px solid #ffd700;
            padding: 15px;
            margin: 20px 0;
            display: flex;
            justify-content: space-around;
            box-shadow: inset -2px -2px 0 #0a1a2a;
        }
        
        .inventory-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffd700;
            font-size: 0.5em;
            gap: 10px;
        }
        
        .slot-icon {
            width: 48px;
            height: 48px;
            background: #2a3a4a;
            border: 3px solid #4a7a9c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
        }
        
        .slot-icon.completed {
            background: #4a7a9c;
            border-color: #ffd700;
        }
        
        /* DÉTECTIVE ANIMÉ */
        .detective-area {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        
        .detective-pixel {
            width: 96px;
            height: 96px;
            image-rendering: pixelated;
            background: #ffd700;
            position: relative;
            animation: walkCycle 0.6s steps(4) infinite;
        }
        
        /* SPRITES PERSONNAGES PIXEL ART */
        .pixel-sprite {
            width: 96px;
            height: 96px;
            margin: 15px auto;
            image-rendering: pixelated;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        
        /* ANTIGONE - Style grec */
        .sprite-antigone {
            background: linear-gradient(45deg, #8b5a2b 25%, #c9a87c 25%, #c9a87c 50%, #8b5a2b 50%, #8b5a2b 75%, #c9a87c 75%);
            background-size: 16px 16px;
            border: 4px solid #ffd700;
            position: relative;
            animation: float 3s ease-in-out infinite;
        }
        .sprite-antigone::before {
            content: "👤";
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 2em;
            filter: drop-shadow(2px 2px 0 #000);
        }
        .sprite-antigone::after {
            content: "🏛️";
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 1.5em;
        }
        
        /* CONDAMNÉ - Prison */
        .sprite-condamne {
            background: repeating-linear-gradient(45deg, #2a2a2a 0px, #2a2a2a 8px, #3a3a3a 8px, #3a3a3a 16px);
            border: 4px solid #4a7a9c;
            position: relative;
            animation: shake 0.5s ease-in-out infinite;
        }
        .sprite-condamne::before {
            content: "⛓️";
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 2em;
        }
        .sprite-condamne::after {
            content: "📝";
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 1.5em;
        }
        
        /* ENFANT DE FÈS */
        .sprite-enfant {
            background: linear-gradient(135deg, #e6be8a 0%, #c9a87c 100%);
            border: 4px solid #ffd700;
            position: relative;
            animation: bounce 1s ease-in-out infinite;
        }
        .sprite-enfant::before {
            content: "👦";
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 2em;
        }
        .sprite-enfant::after {
            content: "📦";
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 1.5em;
        }
        
        /* AUTEURS */
        .sprite-auteur {
            background: #ffd700;
            border: 4px solid #4a7a9c;
            position: relative;
            animation: float 4s ease-in-out infinite;
        }
        .sprite-auteur::before {
            content: "✍️";
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 2em;
        }
        
        /* LIEUX PIXEL ART AVEC EXTRAITS INCORPORÉS */
        .pixel-location-card {
            border: 6px solid #ffd700;
            margin: 20px 0;
            background: #1a2a3a;
            box-shadow: inset -4px -4px 0 #0a1a2a;
        }
        
        .location-header {
            background: #4a7a9c;
            color: #ffd700;
            padding: 10px;
            font-size: 0.6em;
            text-align: center;
            border-bottom: 4px solid #ffd700;
        }
        
        .location-pixelart {
            height: 100px;
            image-rendering: pixelated;
            position: relative;
            border-bottom: 4px solid #ffd700;
        }
        
        /* THEBES */
        .thebes-bg {
            background: linear-gradient(45deg, #8b5a2b 20px, #c9a87c 20px, #c9a87c 40px, #8b5a2b 40px);
            background-size: 40px 40px;
            animation: scroll 30s linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .thebes-bg::after {
            content: "🏛️🏛️🏛️";
            font-size: 2em;
            color: #ffd700;
            text-shadow: 2px 2px 0 #000;
        }
        
        /* PRISON */
        .prison-bg {
            background: repeating-linear-gradient(90deg, #2a2a2a 0px, #2a2a2a 10px, #3a3a3a 10px, #3a3a3a 20px);
            animation: pulse 2s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .prison-bg::after {
            content: "⛓️⛓️⛓️";
            font-size: 2em;
            color: #4a7a9c;
        }
        
        /* FÈS */
        .fes-bg {
            background: radial-gradient(circle at 20px 20px, #e6be8a 10px, #c9a87c 10px);
            background-size: 40px 40px;
            animation: scroll 20s linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fes-bg::after {
            content: "🕌🕌🕌";
            font-size: 2em;
            color: #ffd700;
        }
        
        /* EXTRAITS ILLUSTRÉS */
        .illustrated-extrait {
            background: #2a3a4a;
            border: 4px solid #4a7a9c;
            padding: 15px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #ffd700;
            font-size: 0.6em;
            line-height: 2;
        }
        
        .extrait-icon {
            font-size: 3em;
            min-width: 60px;
            text-align: center;
            filter: drop-shadow(4px 4px 0 #000);
        }
        
        /* BOUTONS PIXEL */
        .pixel-btn {
            background: #4a7a9c;
            border: 4px solid #ffd700;
            color: #ffd700;
            padding: 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6em;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: inset -4px -4px 0 #2a4a6a, 4px 4px 0 #000;
            transition: all 0.1s;
        }
        
        .pixel-btn:hover {
            transform: translate(2px, 2px);
            box-shadow: inset -2px -2px 0 #2a4a6a, 2px 2px 0 #000;
        }
        
        .choice-pixel {
            background: #ffd700;
            border: 4px solid #4a7a9c;
            color: #1a2a3a;
            padding: 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5em;
            cursor: pointer;
            margin: 5px 0;
            text-align: left;
            box-shadow: inset -2px -2px 0 #b8860b;
            transition: all 0.1s;
        }
        
        .choice-pixel:hover {
            background: #ffffa0;
            transform: scale(0.98);
        }
        
        /* RETOURS VISUELS */
        .feedback-good {
            background: #4a7a9c;
            border: 6px solid #ffd700;
            color: #ffd700;
            padding: 20px;
            font-size: 0.6em;
            line-height: 2;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: glow 1s infinite alternate;
        }
        
        .feedback-bad {
            background: #8b0000;
            border: 6px solid #ffd700;
            color: #ffd700;
            padding: 20px;
            font-size: 0.6em;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        /* GRILLE DE LA CARTE */
        .map-pixel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        
        .map-tile {
            background: #1a2a3a;
            border: 6px solid #4a7a9c;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s;
            color: #ffd700;
            font-size: 0.5em;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .map-tile:hover {
            border-color: #ffd700;
            transform: scale(0.95);
        }
        
        .map-tile.completed {
            background: #4a7a9c;
            border-color: #ffd700;
        }
        
        .tile-icon {
            font-size: 3em;
        }
        
        /* ANIMATIONS */
        @keyframes walkCycle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        
        @keyframes scroll {
            from { background-position: 0 0; }
            to { background-position: 80px 80px; }
        }
        
        @keyframes pulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(0.5); }
        }
        
        @keyframes glow {
            from { filter: brightness(1); }
            to { filter: brightness(1.3); }
        }
        
        /* SCÈNE DE JEU */
        .pixel-scene {
            background: #1a2a3a;
            border: 6px solid #ffd700;
            padding: 20px;
            margin: 20px 0;
        }
        
        /* DIPLÔME FINAL */
        .pixel-diploma {
            background: linear-gradient(135deg, #ffd700, #b8860b);
            border: 8px double #4a7a9c;
            padding: 30px;
            text-align: center;
            color: #1a2a3a;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- HEADER JAUNE ET BLEU -->
        <div class="pixel-header">
            <span class="pixel-title">🔍 LA NUIT DES MANUSCRITS</span>
            <span class="pixel-badge">DOSSIER N°2024</span>
        </div>
        
        <!-- PROGRESSION -->
        <div class="pixel-progress">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            <div class="progress-steps">
                <span>🏛️</span>
                <span>⛓️</span>
                <span>🕌</span>
                <span>🏆</span>
            </div>
        </div>
        
        <!-- INVENTAIRE -->
        <div class="pixel-inventory">
            <div class="inventory-slot">
                <div class="slot-icon" id="antigone-icon">🏛️</div>
                <span>ANTIGONE</span>
            </div>
            <div class="inventory-slot">
                <div class="slot-icon" id="dernier-icon">⛓️</div>
                <span>CONDAMNÉ</span>
            </div>
            <div class="inventory-slot">
                <div class="slot-icon" id="boite-icon">🕌</div>
                <span>FÈS</span>
            </div>
        </div>
        
        <!-- DÉTECTIVE ANIMÉ -->
        <div class="detective-area">
            <div class="detective-pixel"></div>
        </div>
        
        <!-- CONTENEUR DES SCÈNES -->
        <div id="scene-container"></div>
        
        <!-- BOUTON RÉINITIALISATION -->
        <button class="pixel-btn" onclick="resetGame()" style="margin-top: 20px;">🔍 NOUVELLE ENQUÊTE</button>
    </div>

    <script>
        // ÉTAT DU JEU
        let gameState = {
            currentScene: 'accueil',
            chapter1Completed: false,
            chapter2Completed: false,
            chapter3Completed: false,
            antigoneQ1Correct: false,
            antigoneQ2Correct: false,
            dernierjourQ1Correct: false,
            dernierjourQ2Correct: false,
            boiteQ1Correct: false,
            boiteQ2Correct: false
        };
        
        // MISE À JOUR DE L'INTERFACE
        function updateUI() {
            // Barre de progression
            let progress = 0;
            if(gameState.chapter1Completed) progress += 33.33;
            if(gameState.chapter2Completed) progress += 33.33;
            if(gameState.chapter3Completed) progress += 33.33;
            document.getElementById('progress-fill').style.width = progress + '%';
            
            // Inventaire
            document.getElementById('antigone-icon').className = `slot-icon ${gameState.chapter1Completed ? 'completed' : ''}`;
            document.getElementById('dernier-icon').className = `slot-icon ${gameState.chapter2Completed ? 'completed' : ''}`;
            document.getElementById('boite-icon').className = `slot-icon ${gameState.chapter3Completed ? 'completed' : ''}`;
        }
        
        // RENDU DES SCÈNES
        function renderScene() {
            const container = document.getElementById('scene-container');
            let html = '';
            
            switch(gameState.currentScene) {
                case 'accueil':
                    html = renderAccueil();
                    break;
                case 'carte':
                    html = renderCarte();
                    break;
                case 'antigone1':
                    html = renderAntigone1();
                    break;
                case 'antigone2':
                    html = renderAntigone2();
                    break;
                case 'antigone3':
                    html = renderAntigone3();
                    break;
                case 'antigone4':
                    html = renderAntigone4();
                    break;
                case 'antigoneBad':
                    html = renderAntigoneBad();
                    break;
                case 'dernierjour1':
                    html = renderDernierJour1();
                    break;
                case 'dernierjour2':
                    html = renderDernierJour2();
                    break;
                case 'dernierjour3':
                    html = renderDernierJour3();
                    break;
                case 'dernierjour4':
                    html = renderDernierJour4();
                    break;
                case 'dernierjourBad':
                    html = renderDernierJourBad();
                    break;
                case 'boite1':
                    html = renderBoite1();
                    break;
                case 'boite2':
                    html = renderBoite2();
                    break;
                case 'boite3':
                    html = renderBoite3();
                    break;
                case 'boite4':
                    html = renderBoite4();
                    break;
                case 'boiteBad':
                    html = renderBoiteBad();
                    break;
                case 'final':
                    html = renderFinal();
                    break;
                default:
                    html = renderAccueil();
            }
            
            container.innerHTML = html;
            updateUI();
        }
        
        // SCÈNE ACCUEIL
        function renderAccueil() {
            return `
                <div class="pixel-scene">
                    <div style="text-align: center; margin-bottom: 30px;">
                        <span style="font-size: 3em; filter: drop-shadow(4px 4px 0 #4a7a9c);">🔍</span>
                    </div>
                    
                    <div class="illustrated-extrait">
                        <span class="extrait-icon">📜</span>
                        <span>"Trois œuvres ont perdu leur âme. Leurs personnages errent dans la nuit..."</span>
                    </div>
                    
                    <div style="color: #ffd700; font-size: 0.5em; line-height: 2; text-align: center; margin: 20px 0;">
                        Une lettre mystérieuse est arrivée au cabinet.<br>
                        Antigone, le Condamné et l'Enfant de Fès ont besoin de vous.<br>
                        Parcourez les lieux, interrogez les personnages, résolvez les énigmes.
                    </div>
                    
                    <button class="pixel-btn" onclick="goToScene('carte')">🗺️ COMMENCER L'ENQUÊTE</button>
                </div>
            `;
        }
        
        // CARTE DES LIEUX
        function renderCarte() {
            return `
                <div class="pixel-scene">
                    <h2 style="color: #ffd700; font-size: 0.7em; text-align: center; margin-bottom: 20px;">🗺️ CARTE DES LIEUX</h2>
                    
                    <div class="map-pixel-grid">
                        <div class="map-tile ${gameState.chapter1Completed ? 'completed' : ''}" onclick="goToScene('antigone1')">
                            <span class="tile-icon">🏛️</span>
                            <span>THÈBES</span>
                            <span style="font-size: 0.8em;">Antigone</span>
                            ${gameState.chapter1Completed ? '✅' : ''}
                        </div>
                        
                        <div class="map-tile ${gameState.chapter2Completed ? 'completed' : ''}" onclick="goToScene('dernierjour1')">
                            <span class="tile-icon">⛓️</span>
                            <span>PRISON</span>
                            <span style="font-size: 0.8em;">Bicêtre</span>
                            ${gameState.chapter2Completed ? '✅' : ''}
                        </div>
                        
                        <div class="map-tile ${gameState.chapter3Completed ? 'completed' : ''}" onclick="goToScene('boite1')">
                            <span class="tile-icon">🕌</span>
                            <span>FÈS</span>
                            <span style="font-size: 0.8em;">Médina</span>
                            ${gameState.chapter3Completed ? '✅' : ''}
                        </div>
                        
                        <div class="map-tile ${(gameState.chapter1Completed && gameState.chapter2Completed && gameState.chapter3Completed) ? 'completed' : ''}" onclick="goToScene('final')">
                            <span class="tile-icon">📋</span>
                            <span>RAPPORT</span>
                            <span style="font-size: 0.8em;">Final</span>
                        </div>
                    </div>
                    
                    <button class="pixel-btn" onclick="goToScene('accueil')">🔙 RETOUR</button>
                </div>
            `;
        }
        
        // ANTIGONE - SCÈNE 1
        function renderAntigone1() {
            return `
                <div class="pixel-scene">
                    <div class="location-header">🏛️ PALAIS DE THÈBES - NUIT</div>
                    <div class="location-pixelart thebes-bg"></div>
                    
                    <div class="pixel-sprite sprite-antigone"></div>
                    
                    <div class="illustrated-extrait">
                        <span class="extrait-icon">📜</span>
                        <span>"ANTIGONE : Je dirai oui. Je dirai oui à la mort, plutôt que de dire non à ce que je dois faire."</span>
                    </div>
                    
                    <button class="pixel-btn" onclick="goToScene('antigone2')">🚪 ENTRER DANS LE PALAIS</button>
                </div>
            `;
        }
        
        // ANTIGONE - SCÈNE 2
        function renderAntigone2() {
            return `
                <div class="pixel-scene">
                    <div class="location-header">🏛️ LA CHAMBRE D'ANTIGONE</div>
                    <div class="pixel-sprite sprite-antigone"></div>
                    
                    <div class="illustrated-extrait">
                        <span class="extrait-icon">💬</span>
                        <span>ANTIGONE : "Qui ose entrer dans ma chambre à cette heure ?"</span>
                    </div>
                    
                    <div class="illustrated-extrait">
                        <span class="extrait-icon">🕵️</span>
                        <span>DÉTECTIVE : "Je cherche à comprendre votre histoire."</span>
                    </div>
                    
                    <button class="pixel-btn" onclick="goToScene('antigone3')">🗣️ POSER UNE QUESTION</button>
                </div>
            `;
        }
        
        // ANTIGONE - QUESTION 1
        function renderAntigone3() {
            return `
                <div class="pixel-scene">
                    <div class="location-header">🏛️ INTERROGATOIRE</div>
                    <div class="pixel-sprite sprite-antigone"></div>
                    
                    <div class="illustrated-extrait">
                        <span class="extrait-icon">❓</span>
                        <span>ANTIGONE : "Quand je parle, qui raconte mon histoire ?"</span>
                    </div>
                    
                    <button class="choice-pixel" onclick="checkAntigoneQ1('A')">A) C'est Antigone qui raconte</button>
